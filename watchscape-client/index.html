<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/watchscape.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchscape — Every Movie Tells a Part of Your Story</title>
    <meta name="description" content="Watchscape is your personal movie tracker. Discover, track, and share the movies that shape your story." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content=" #0F172A" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('SW registered successfully'))
            .catch(err => console.log('SW registration failed', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
