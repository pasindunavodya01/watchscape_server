<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/watchscape.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Watchscape — Every Movie Tells a Part of Your Story</title>
    <meta name="description" content="Watchscape is your personal movie tracker. Discover, track, and share the movies that shape your story." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content=" #0F172A" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (function () {
        function setAppVh() {
          var vv = window.visualViewport;
          var h = vv ? vv.height : window.innerHeight;
          var top = vv ? vv.offsetTop : 0;
          document.documentElement.style.setProperty('--app-vh', h + 'px');
          document.documentElement.style.setProperty('--app-vh-offset', top + 'px');
        }
        setAppVh();
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppVh);
          window.visualViewport.addEventListener('scroll', setAppVh);
        }
        window.addEventListener('resize', setAppVh);
        window.addEventListener('orientationchange', setAppVh);
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (
                    newWorker.state === 'installed' &&
                    navigator.serviceWorker.controller
                  ) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch((err) => console.log('SW registration failed', err));
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
